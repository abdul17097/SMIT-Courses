<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .section {
        width: 200px;
        height: 200px;
        border: 1px solid;
        position: absolute;
      }
      .section_1 {
        background-color: red;
        top: 50px;
        z-index: 1;
      }
      .section_2 {
        background-color: green;
        top: 0;
        left: 50px;
        z-index: 2;
      }
      .section_3 {
        background-color: blue;
      }
      .section_4 {
        background-color: black;
        top: 50px;
        left: 50px;
        z-index: 3;
      }

      .product_card {
        width: 300px;
        height: 400px;
        border: 1px solid;
        border-radius: 10px;
        margin: auto;
        position: relative;
      }
      .product_card > img {
        width: 100%;
        height: 250px;
        border-radius: 10px 10px 0 0;
      }
      .product_deail {
        padding: 10px;
      }
      .product_deail > button {
        width: 100%;
        padding: 5px 0;
        border-radius: 5px;
        border: none;
        font-size: 18px;
      }
      .product_deail > button:hover {
        background-color: green;
        color: white;
      }
      #heart {
        width: 50px;
        height: 50px;
        border: 1px solid;
        display: block;
        position: absolute;
        top: 10px;
        right: 10px;
      }
    </style>
  </head>
  <body>
    <!-- <div class="section_1 section"></div>
    <div class="section_2 section"></div>
    <div class="section_3 section"></div>
    <div class="section_4 section"></div> -->

    <div class="product_card">
      <img src="../images/logo.png" alt="" />
      <img id="heart" src="../images/images.png" alt="" />
      <div class="product_deail">
        <h2>Product Title</h2>
        <p>Lorem ipsum dolor sit amet.</p>
        <button>Add To Cart</button>
      </div>
    </div>
  </body>
</html>
